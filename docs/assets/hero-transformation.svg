<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="400" fill="transparent"/>

  <g transform="translate(50, 50)" filter="url(#shadow)">
    <rect width="400" height="300" rx="10" fill="#1e1e1e"/>
    <path d="M0 10 a10 10 0 0 1 10 -10 h380 a10 10 0 0 1 10 10 v20 h-400 z" fill="#333"/>
    <circle cx="20" cy="15" r="4" fill="#ff5f56"/>
    <circle cx="35" cy="15" r="4" fill="#ffbd2e"/>
    <circle cx="50" cy="15" r="4" fill="#27c93f"/>
    <text x="70" y="20" font-family="sans-serif" font-size="10" fill="#888">auth_service.py</text>

    <g transform="translate(20, 60)" font-family="monospace" font-size="12">
      <text y="0" fill="#6a9955">// Refactor v2</text>
      <rect y="20" width="360" height="20" fill="rgba(255,0,0,0.1)"/>
      <text x="25" y="34" fill="#d4d4d4">- delete session_v1()</text>
      <text y="34" fill="#666" font-size="10">124</text>

      <rect y="45" width="360" height="20" fill="rgba(0,255,0,0.05)"/>
      <text x="25" y="59" fill="#d4d4d4">+ init_secure_ctx(req)</text>
      <text y="59" fill="#666" font-size="10">125</text>

      <text x="25" y="84" fill="#d4d4d4">+ if req.admin:</text>
      <text y="84" fill="#666" font-size="10">126</text>

      <text x="40" y="104" fill="#d4d4d4">+   elevate_privs()</text>
      <text y="104" fill="#666" font-size="10">127</text>

      <text y="140" fill="#666">... 48 more lines</text>
    </g>
  </g>

  <text x="475" y="215" font-family="sans-serif" font-size="40" fill="#3fb950" opacity="0.6">-&gt;</text>

  <g transform="translate(550, 50)" filter="url(#shadow)">
    <rect width="400" height="300" rx="10" fill="#ffffff" stroke="#3fb950" stroke-width="2"/>
    <rect width="400" height="40" rx="10" fill="#f6f8fa"/>
    <path d="M0 10 a10 10 0 0 1 10 -10 h380 a10 10 0 0 1 10 10 v30 h-400 z" fill="#f6f8fa"/>
    <text x="20" y="25" font-family="sans-serif" font-weight="bold" font-size="12" fill="#24292e">PR Review Checklist</text>

    <g transform="translate(25, 80)" font-family="sans-serif">
      <text y="0" font-weight="bold" font-size="15" fill="#24292e">3 Critical Points Found</text>

      <g transform="translate(0, 30)">
        <rect width="350" height="50" rx="6" fill="#f0fff4" stroke="#dcffe4"/>
        <rect x="15" y="15" width="20" height="20" rx="4" fill="transparent" stroke="#2ea44f" stroke-width="1.5"/>
        <text x="45" y="25" font-weight="bold" font-size="12" fill="#1a7f37">[ ] Privilege Elevation Risk</text>
        <text x="45" y="42" font-size="11" fill="#586069">Verify elevate_privs restricted to admin.</text>
      </g>

      <g transform="translate(0, 95)">
        <rect width="350" height="50" rx="6" fill="transparent" stroke="#f0f0f0"/>
        <rect x="15" y="15" width="20" height="20" rx="4" fill="transparent" stroke="#d4d4d4" stroke-width="1.5"/>
        <text x="45" y="25" font-weight="bold" font-size="12" fill="#24292e">[ ] Database Sync Check</text>
        <text x="45" y="42" font-size="11" fill="#586069">Background job handles retries correctly.</text>
      </g>

      <g transform="translate(0, 160)">
        <rect width="350" height="30" rx="6" fill="transparent" stroke="#f0f0f0"/>
        <text x="15" y="20" font-style="italic" font-size="11" fill="#888">+ Suggested test scenarios...</text>
      </g>
    </g>
  </g>
</svg>
